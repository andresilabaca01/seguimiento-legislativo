name: Actualizar monitor legislativo ABIF

on:
  workflow_dispatch:
  schedule:
    # 10:05 Chile aprox. en horario estándar. Ajustar si el repo usa otro criterio.
    - cron: '5 14 * * 1-5'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar scraper ABIF v4
        run: python scraper_abif_v4.py --input proyectos.json --output proyectos.json --years-back 1

      - name: Commit si cambió proyectos.json
        run: |
          git config user.name "abif-monitor-bot"
          git config user.email "actions@github.com"
          git add proyectos.json
          git diff --cached --quiet && echo "Sin cambios" || git commit -m "Actualiza monitor legislativo ABIF"
          git push
