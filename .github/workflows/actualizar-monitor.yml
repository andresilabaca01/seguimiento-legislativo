name: Actualizar monitor legislativo ABIF

on:
  workflow_dispatch:
  schedule:
    # Lunes a viernes 10:00 Chile aprox. Ajustar según horario de verano si quieres.
    - cron: '0 14 * * 1-5'

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ejecutar scraper v6
        env:
          # Fallback para páginas públicas de Cámara si GitHub Actions recibe HTTP 403 desde camara.cl.
          # Puedes poner 0 si no quieres usar terceros.
          USAR_JINA_FALLBACK: '1'
        run: python scraper_abif_v6.py --input proyectos.json --output proyectos.json --years-back 1

      - name: Commit cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add proyectos.json
          if git diff --cached --quiet; then
            echo "Sin cambios que commitear"
          else
            git commit -m "Actualizar monitor legislativo ABIF"
            git push
          fi
